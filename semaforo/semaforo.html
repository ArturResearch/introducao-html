<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }

        .semaforo {
            width: 200px;
            background-color: black;
            box-sizing: border-box;
            padding: 20px;
            margin: 20px auto;
        }

        .caixa-verde {
            width: 160px;
            height:160px;
            border-radius: 50%;
            box-sizing: border-box;
            background-color: green;
        }

        .caixa-amarelo {
            width: 160px;
            height:160px;
            border-radius: 50%;
            box-sizing: border-box;
            background-color: yellow;
        }

        .caixa-vermelho {
            width: 160px;
            height:160px;
            border-radius: 50%;
            box-sizing: border-box;
            background-color: red;

        }

        .lanterna {
            width: 160px;
            height:160px;
            border: solid 3px gray;
            border-radius: 50%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="semaforo">

        <div class="caixa-verde">
            <div class="lanterna"></div>
        </div>

        <div class="caixa-amarelo">
            <div class="lanterna"></div>
        </div>

        <div class="caixa-vermelho">
            <div class="lanterna"></div>
        </div>

    </div>
    
</body>
</html>
